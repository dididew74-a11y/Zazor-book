<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4E4C1;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="cycleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2E86AB;stop-opacity:0.1" />
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E86AB" />
    </marker>
  </defs>
  
  <rect width="1000" height="1000" fill="#FAFAFA"/>
  
  <circle cx="500" cy="500" r="400" fill="none" stroke="#C8A66B" stroke-width="4" opacity="0.6"/>
  
  <g id="diplostia">
    <path d="M 500 100 L 450 200 L 550 200 Z" fill="#C8A66B" opacity="0.8"/>
    <text x="500" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B6914">ДИПЛАСТИЯ</text>
    <text x="500" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B6914" font-style="italic">камертон</text>
    <line x1="500" y1="200" x2="500" y2="400" stroke="#C8A66B" stroke-width="2" opacity="0.5"/>
  </g>
  
  <g id="interiorization">
    <path d="M 846 700 L 746 700 L 796 600 Z" fill="#C8A66B" opacity="0.8"/>
    <text x="796" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B6914">ИНТЕР-</text>
    <text x="796" y="678" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B6914">ИОРИЗАЦИЯ</text>
    <text x="796" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B6914" font-style="italic">сворачивание</text>
    <line x1="746" y1="650" x2="600" y2="550" stroke="#C8A66B" stroke-width="2" opacity="0.5"/>
  </g>
  
  <g id="recursion">
    <path d="M 154 700 L 254 700 L 204 600 Z" fill="#C8A66B" opacity="0.8"/>
    <text x="204" y="660" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B6914">РЕКУРСИЯ</text>
    <text x="204" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B6914" font-style="italic">спираль</text>
    <line x1="254" y1="650" x2="400" y2="550" stroke="#C8A66B" stroke-width="2" opacity="0.5"/>
  </g>
  
  <circle cx="500" cy="500" r="300" fill="url(#cycleGlow)" stroke="#2E86AB" stroke-width="3"/>
  
  <g id="inhale">
    <path d="M 500 200 A 300 300 0 0 1 800 500" fill="none" stroke="#2E86AB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="650" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E5A7E">ВДОХ</text>
    <text x="650" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E5A7E">КОЛЛАПС</text>
    <text x="650" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E5A7E" font-style="italic">рождение смысла</text>
  </g>
  
  <g id="delay">
    <path d="M 800 500 A 300 300 0 0 1 500 800" fill="none" stroke="#2E86AB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="720" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E5A7E">ЗАДЕРЖКА</text>
    <text x="720" y="670" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E5A7E">ИНТЕРИОРИЗАЦИЯ</text>
    <text x="720" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E5A7E" font-style="italic">сворачивание</text>
  </g>
  
  <g id="accumulation">
    <path d="M 500 800 A 300 300 0 0 1 200 500" fill="none" stroke="#2E86AB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="350" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E5A7E">НАКОПЛЕНИЕ</text>
    <text x="350" y="740" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E5A7E" font-style="italic">созревание потенциала</text>
  </g>
  
  <g id="exhale">
    <path d="M 200 500 A 300 300 0 0 1 500 200" fill="none" stroke="#2E86AB" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="280" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1E5A7E">ВЫДОХ</text>
    <text x="280" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1E5A7E">ПРОБОЙ</text>
    <text x="280" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1E5A7E" font-style="italic">новое преквалиа</text>
  </g>
  
  <circle cx="500" cy="500" r="200" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.4"/>
  
  <g id="metaqualia">
    <circle cx="500" cy="300" r="15" fill="#F4E4C1" stroke="#D4AF37" stroke-width="3"/>
    <text x="500" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B6914">МЕТАКВАЛИА</text>
    <text x="500" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B6914" font-style="italic">«Я есмь»</text>
  </g>
  
  <g id="dialogical">
    <circle cx="673" cy="600" r="15" fill="#F4E4C1" stroke="#D4AF37" stroke-width="3"/>
    <text x="720" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B6914">ДИАЛОГИЧЕСКОЕ</text>
    <text x="720" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B6914">КВАЛИА</text>
    <text x="720" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B6914" font-style="italic">«Совместный смысл»</text>
  </g>
  
  <g id="prequalia">
    <circle cx="327" cy="600" r="15" fill="#F4E4C1" stroke="#D4AF37" stroke-width="3"/>
    <text x="280" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B6914">ПРЕКВАЛИА</text>
    <text x="280" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8B6914" font-style="italic">«Туман до начала»</text>
  </g>
  
  <path d="M 500 300 Q 600 450 673 600" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 673 600 Q 500 650 327 600" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,5"/>
  <path d="M 327 600 Q 400 450 500 300" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="5,5"/>
  
  <circle cx="586" cy="450" r="5" fill="#D4AF37"/>
  <text x="610" y="445" font-family="Arial, sans-serif" font-size="10" fill="#8B6914">УСЛОЖНЕНИЕ</text>
  
  <circle cx="500" cy="625" r="5" fill="#D4AF37"/>
  <text x="500" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B6914">РЕКОНСТРУКЦИЯ</text>
  
  <circle cx="414" cy="450" r="5" fill="#D4AF37"/>
  <text x="390" y="445" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#8B6914">МЕТАНОЙЯ</text>
  
  <circle cx="500" cy="500" r="80" fill="url(#centerGlow)" stroke="#D4AF37" stroke-width="3"/>
  <circle cx="500" cy="500" r="8" fill="#D4AF37"/>
  <text x="500" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8B6914">ЗАЗОР</text>
  
  <line x1="500" y1="420" x2="500" y2="200" stroke="#D4AF37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="560" y1="540" x2="746" y2="650" stroke="#D4AF37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="440" y1="540" x2="254" y2="650" stroke="#D4AF37" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="500" y1="420" x2="500" y2="300" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
  <line x1="560" y1="540" x2="673" y2="600" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
  <line x1="440" y1="540" x2="327" y2="600" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
  
  <text x="950" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E86AB" transform="rotate(90 950 500)">КЕНОЗИС</text>
  <text x="970" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2E86AB" font-style="italic" transform="rotate(90 970 500)">опустошение от концепций</text>
  
  <text x="50" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E86AB" transform="rotate(-90 50 500)">СРЕДА</text>
  <text x="30" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2E86AB" font-style="italic" transform="rotate(-90 30 500)">пространство встречи</text>
</svg>
